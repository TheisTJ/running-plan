apiVersion: v1
kind: Service
metadata:
  name: running-plan
  namespace: running-plan
  labels:
    app: running-plan
spec:
  type: ClusterIP
  selector:
    app: running-plan
  ports:
    - name: http
      port: 80
      targetPort: 80
# Reach it locally without an ingress controller:
#   kubectl -n running-plan port-forward svc/running-plan 8080:80
#   → http://localhost:8080
